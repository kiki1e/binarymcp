version: '3.8'

services:
  pwnmcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: pwnmcp-kiki1e:latest
    container_name: pwnmcp-kiki1e
    
    # 调试所需的权限
    # 警告: 以下配置会降低容器的安全性, 但对于 GDB 调试是必需的。
    # SYS_ADMIN 和 seccomp:unconfined 提供了几乎等同于 host 的权限。
    # 仅在信任此项目源码的情况下使用。
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    
    security_opt:
      - seccomp=unconfined
      - apparmor=unconfined
    
    # 端口映射
    ports:
      - "${MCP_PORT:-5500}:${MCP_PORT:-5500}"    # MCP 主服务
      - "${API_PORT:-5501}:${API_PORT:-5501}"    # 附加 API
    
    # 挂载工作区
    volumes:
      - ./workspace:/workspace
    
    # 从 .env 文件加载环境变量
    env_file:
      - .env
    
    # 资源限制
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G
    
    # 重启策略
    restart: unless-stopped
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
